<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Peregolise — Developer Portfolio</title>

  <!-- JetBrains Mono via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet"
  />

  <!-- Nerd Font symbols subset for powerline glyphs and tree icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/symbols-nerd-font@5.0.0/index.css"
  />

  <!-- m2-layout: three-panel grid, collapsible drawer, mobile styles -->
  <link rel="stylesheet" href="/src/layout/style.css" />

  <style>
    /* ── CSS Custom Properties (restrained-terminal defaults) ── */
    /* See restyle/portfolio-style-guide.md for the palette roles. */
    /* Overridden at runtime by applyThemeCSSVars() in theme.ts    */
    :root {
      --tmux-green: #9aa5b1;
      --divider: #1f1f22;
      --bg-main: #0e0e10;
      --fg-main: #c8c8c2;
      --cursor: #c8c8c2;
      --selection: #2a2a2d;
      --bg-elev: #16161a;
      --bg-chip: #1a1a1d;
      --border: #1f1f22;
      --dim: #6b6b6b;
      --dim-deep: #3a3a3c;
      --fg-bright: #e2e2dc;
      --accent: #9aa5b1;
      --accent-edge: #3a4048;
      --ansi-0: #16161a;
      --ansi-1: #b05656;
      --ansi-2: #7c9885;
      --ansi-3: #a89868;
      --ansi-4: #8ba3c4;
      --ansi-5: #a08ca8;
      --ansi-6: #9aa5b1;
      --ansi-7: #c8c8c2;
      --ansi-8: #6b6b6b;
      --ansi-9: #c46a6a;
      --ansi-10: #8fae98;
      --ansi-11: #bcab76;
      --ansi-12: #9fb4d1;
      --ansi-13: #b3a0ba;
      --ansi-14: #aeb9c5;
      --ansi-15: #e2e2dc;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar: window title (row 1, spans all columns) -->
    <header id="top-bar">
      <span class="top-bar-left"><span class="top-bar-dot">●</span> www — daniel peregolise</span>
      <span class="top-bar-right">portfolio.dev</span>
    </header>

    <!-- Left panel: AI Agent Shell (spans all grid rows, full height) -->
    <div id="agent-shell" class="panel left-panel">
      <!-- xterm.js AgentTerminal mounts here (m3) -->
    </div>

    <!-- Vertical divider (column 2, all rows) -->
    <div id="divider-vertical" class="divider vertical"></div>

    <!-- Right panel: file explorer + vim editor (column 3, row 1) -->
    <div id="right-panel" class="panel right-panel">
      <!-- NERDTree-style file explorer (top ~25%) -->
      <div id="file-explorer" class="panel top-panel">
        <!-- NERDTree DOM tree renders here (m4) -->
      </div>

      <!-- Horizontal divider inside right panel -->
      <div id="divider-horizontal" class="divider horizontal"></div>

      <!-- Vim editor wrap (bottom ~75%): editor + powerline -->
      <div id="vim-editor-wrap" class="panel bottom-panel">
        <!-- Legacy alias used by m1 scaffold -->
        <div id="vim-editor-container" style="display:contents">
          <!-- Markdown preview (normal mode) -->
          <div id="md-preview" class="md-preview"></div>
          <!-- CodeMirror 6 mounts here (m4) -->
          <div id="vim-editor"></div>
          <!-- Powerline status bar (m4) -->
          <div id="powerline-status-bar" class="powerline"></div>
        </div>
      </div>
    </div>

    <!-- Drawer toggle / bottom divider (clickable 1px bar) -->
    <div id="drawer-toggle" class="divider horizontal" role="button" aria-label="Toggle CLI drawer" tabindex="0"></div>

    <!-- CLI drawer (bottom, collapsible) -->
    <div id="cli-drawer" class="panel cli-drawer">
      <!-- xterm.js CLITerminal mounts here (m5) -->
    </div>

    <!-- Bottom status bar: tmux-style repo line (last row, spans all columns) -->
    <footer id="bottom-status-bar">
      <span class="status-left"><span class="status-repo">portfolio</span> master ✓</span>
      <span class="status-right">utf-8 · 100% · <span id="status-clock">00:00</span></span>
    </footer>
  </div>

  <!-- Mobile hamburger button (☰) — shown only on mobile via CSS -->
  <button id="hamburger-btn" aria-label="Toggle file explorer">☰</button>
  <!-- Legacy alias for backward compat -->
  <button id="hamburger-menu" class="hamburger" aria-label="Toggle file explorer" style="display:none">☰</button>

  <!-- Mobile file explorer sidebar (slides in from left) -->
  <div id="mobile-explorer-sidebar" role="navigation" aria-label="File explorer">
    <!-- File explorer content cloned here by MobileLayout (m2) -->
  </div>

  <!-- Legacy mobile sidebar alias -->
  <aside id="mobile-sidebar" class="sidebar-drawer" style="display:none">
    <div id="mobile-file-explorer"></div>
  </aside>

  <!-- Mobile backdrop (semi-transparent overlay, click to close sidebar) -->
  <div id="mobile-backdrop" aria-hidden="true"></div>

  <!-- App entry point -->
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
