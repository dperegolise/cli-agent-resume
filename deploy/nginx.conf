server {
    listen 80;
    server_name _;  # replace with your actual domain

    # Static frontend (Vite build output)
    location / {
        root /var/www/portfolio/dist;
        try_files $uri $uri/ /index.html;  # SPA fallback

        # Long-lived cache for hashed assets (content-addressed filenames from Vite)
        location ~* /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for index.html — must always be fresh so new asset hashes are picked up
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # FastAPI SSE agent endpoint
    # SSE requires specific nginx settings to avoid buffering breaking the stream
    location /agent {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE-critical: disable all buffering so tokens reach the browser immediately
        proxy_buffering off;
        proxy_cache off;

        # Long read timeout — agent calls can take a while on slow model providers
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Tell nginx upstream (e.g., Varnish, CDN) not to buffer this response
        add_header X-Accel-Buffering no;

        # Ensure chunked transfer encoding is forwarded correctly
        chunked_transfer_encoding on;
    }

    # routr completions proxy (existing live instance on this VPS)
    location /v1 {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
